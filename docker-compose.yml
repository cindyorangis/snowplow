version: '3.8'

services:
  # Marketing Site (Next.js)
  web:
    build:
      context: . # monorepo root (so all workspace files are available)
      dockerfile: apps/web/Dockerfile # each app has its own Dockerfile
    image: snowplow-web
    container_name: snowplow-web
    ports:
      - '3000:3000'
    env_file:
      - apps/web/.env.production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Admin App (Nuxt/Vue)
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./apps/admin:/app
    profiles:
      - admin
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Client App (Next.js)
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=production
      - PORT=3002
    volumes:
      - ./apps/client:/app
    profiles:
      - client
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Crew App (Next.js)
  crew:
    build:
      context: ./apps/crew
      dockerfile: Dockerfile
    ports:
      - '3003:3003'
    environment:
      - NODE_ENV=production
      - PORT=3003
    volumes:
      - ./apps/crew:/app
    profiles:
      - crew
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3003/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
